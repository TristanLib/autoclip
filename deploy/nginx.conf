# !! 此文件仅供参考，setup.sh 不会自动部署它 !!
# 将以下内容整合到你自己的 Nginx vhost 配置中
# 关键点：
#   1. root 指向前端构建产物目录：/opt/autoclip/frontend/dist
#   2. /api/ 代理到后端：http://127.0.0.1:8100
#   3. /api/ 需关闭 proxy_buffering，否则 SSE 进度推送不实时

server {
    listen 80;
    server_name your.domain.com;   # 改成你的域名或 IP

    # ── 前端静态文件 ──────────────────────────────────────────────────────────
    root APP_DIR/frontend/dist;
    index index.html;

    # SPA fallback：所有非文件请求都返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 后端 API 代理 ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 上传超时：视频文件可能较大
        proxy_read_timeout    600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;

        # SSE（进度推送）：必须关闭缓冲，否则进度事件不实时
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ── 媒体文件直接由 Nginx 提供，减轻后端压力 ───────────────────────────────
    location /data/projects/ {
        alias APP_DIR/data/projects/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── 上传大小限制（默认 1GB，按需调整） ─────────────────────────────────────
    client_max_body_size 1024m;

    # ── gzip 压缩 ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
}
